<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Caption Generator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 420px;
      background: #1e293b;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    .subtitle {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 16px;
    }

    select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 2px solid transparent;
      font-size: 14px;
      transition: 0.2s;
    }

    select {
      background: #0f172a;
      color: white;
    }

    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2563eb;
    }

    #output {
      margin-top: 20px;
      padding: 16px;
      background: #0f172a;
      border-radius: 10px;
      min-height: 60px;
      font-size: 16px;
    }

    .copy {
      background: #334155;
    }

    .copy:hover {
      background: #475569;
    }

    /* 🔥 Platform colors (subtle borders) */
    .instagram { border-color: #ff5e00; }
    .tiktok { border-color: #9d00ff; }
    .twitter { border-color: #1da1f2; }
    .other { border-color: #919191; }
select {
  background: #0f172a;
  color: white;
  border: 2px solid transparent;
  outline: none;
}

select:focus {
  outline: none;
}

/* Platform colors */
.instagram { border-color: #ff5e00; }
.tiktok { border-color: #9d00ff; }
.twitter { border-color: #1da1f2; }
.other { border-color: #919191; }

/* Keep color on click (fixes your issue) */
.instagram:focus { border-color: #ff5e00; }
.tiktok:focus { border-color: #9d00ff; }
.twitter:focus { border-color: #1da1f2; }
.other:focus { border-color: #919191; }
  </style>
</head>

<body>

<div class="container">
  <h1>Caption Generator</h1>
  <div class="subtitle">Select the right platform</div>

  <select id="platform">
    <option value="instagram">Instagram</option>
    <option value="tiktok">TikTok</option>
    <option value="twitter">Twitter</option>
    <option value="other">Other</option>
  </select>

  <button id="generateBtn">Generate</button>

  <div id="output">Click generate...</div>

  <button id="copyBtn" class="copy">Copy</button>
</div>

<script>
  const select = document.getElementById("platform");

  // 🔥 Change color based on platform
  function updateStyle() {
    select.classList.remove("instagram", "tiktok", "twitter", "other");
    select.classList.add(select.value);
  }

  select.addEventListener("change", updateStyle);
  updateStyle(); // run on load

  async function generate() {
    const platform = select.value;
    const output = document.getElementById("output");

    try {
      const res = await fetch(`data/${platform}.json`);

      if (!res.ok) throw new Error("Missing file");

      const data = await res.json();

      const prompts = data.prompts;

      const random = prompts[Math.floor(Math.random() * prompts.length)];

      output.innerText = random;

    } catch (err) {
      console.error(err);
      output.innerText = "Error loading prompts.";
    }
  }

function copyPrompt() {
  const btn = document.getElementById("copyBtn");
  const text = document.getElementById("output").innerText;

  navigator.clipboard.writeText(text);

  // 🔥 feedback
  btn.innerText = "Copied ✓";

  setTimeout(() => {
    btn.innerText = "Copy";
  }, 1500);
}

  document.getElementById("generateBtn").addEventListener("click", generate);
  document.getElementById("copyBtn").addEventListener("click", copyPrompt);
</script>

</body>
</html>
